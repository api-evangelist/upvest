    description: >-
      The Upvest Investment API provides a unified interface for building embedded
      investment experiences. It supports placing and managing orders, creating portfolios,
      configuring savings plans, handling securities transfers, and managing user
      accounts and positions. The API covers the full order lifecycle with asynchronous
      processing and webhook notifications for real-time event handling. Key resource
      groups include users and businesses, accounts, orders and executions, instruments
      and price data, portfolios, savings plans, payments (top-ups, withdrawals, direct
      debits), tax and compliance, webhooks, and reporting.
