      - Custody
    humanURL: https://docs.upvest.co/
    baseURL: https://api.upvest.co
    properties:
      - url: https://docs.upvest.co/api
        type: Documentation
      - type: OpenAPI
        url: openapi/upvest-investment-api-openapi.yml
      - type: AsyncAPI
        url: asyncapi/upvest-investment-events-asyncapi.yml
    description: >-
      The Upvest Investment API provides a unified interface for building
      embedded investment experiences. It supports placing and managing orders,
      creating portfolios, configuring savings plans, handling securities
      transfers, and managing user accounts and positions. The API covers the
      full order lifecycle with asynchronous processing and webhook
      notifications for real-time event handling. Financial institutions can use
      the API to offer fractional investing, automated portfolio management, and
      localized investment products across European and UK markets.
