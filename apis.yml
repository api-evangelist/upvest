description: >-
  Upvest is a Berlin-based API-first investment infrastructure provider that enables
  banks, brokers, and wealth managers to build and launch investment experiences through
  a single modular API. Founded in 2017, Upvest is a regulated securities institution
  in Europe and the UK, covering trading, custody, and back-office operations. The
  platform supports fractional investing, portfolios, savings plans, roundups, and
  direct debit, enabling clients like Bunq, DKB, N26, Revolut, and Raisin to offer
  investment products to their customers.
