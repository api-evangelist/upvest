description: >-
  Upvest is a Berlin-based API-first investment infrastructure provider that
  enables banks, brokers, and wealth managers to build and launch investment
  experiences through a single modular API. Founded in 2017, Upvest is a
  regulated securities institution in Europe and the UK, covering trading,
  custody, and back-office operations. Their platform allows financial
  institutions to bypass legacy monoliths and rapidly deploy localized
  investment products including fractional shares, portfolios, savings plans,
  and roundups. Upvest secured $125 million in funding to further modernize
  banking infrastructure and power AI-supported investment engines for
  autonomous advisory.
