naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Corporate Actions
  description: 'Upvest Investment API — Corporate Actions. 1 operations. Lead operation: Upvest List corporate actions. Self-contained
    Naftiko capability covering one Upvest business surface.'
  tags:
  - Upvest
  - Corporate Actions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-corporate-actions
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Corporate Actions business capability. Self-contained, no shared references.
    resources:
    - name: corporate_actions
      path: /corporate_actions
      operations:
      - name: listcorporateactions
        method: GET
        description: Upvest List corporate actions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-corporate-actions-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Corporate Actions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/corporate-actions
      name: corporate-actions
      description: REST surface for corporate_actions.
      operations:
      - method: GET
        name: listcorporateactions
        description: Upvest List corporate actions
        call: investment-corporate-actions.listcorporateactions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-corporate-actions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Corporate Actions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: upvest-list-corporate-actions
      description: Upvest List corporate actions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-corporate-actions.listcorporateactions
      outputParameters:
      - type: object
        mapping: $.
