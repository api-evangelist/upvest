naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Tax Residencies
  description: 'Upvest Investment API — Tax Residencies. 2 operations. Lead operation: Upvest List tax residencies. Self-contained
    Naftiko capability covering one Upvest business surface.'
  tags:
  - Upvest
  - Tax Residencies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-tax-residencies
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Tax Residencies business capability. Self-contained, no shared references.
    resources:
    - name: users-user_id-tax_residencies
      path: /users/{user_id}/tax_residencies
      operations:
      - name: listtaxresidencies
        method: GET
        description: Upvest List tax residencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtaxresidency
        method: POST
        description: Upvest Create a tax residency
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-tax-residencies-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Tax Residencies. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users/{user-id}/tax-residencies
      name: users-user-id-tax-residencies
      description: REST surface for users-user_id-tax_residencies.
      operations:
      - method: GET
        name: listtaxresidencies
        description: Upvest List tax residencies
        call: investment-tax-residencies.listtaxresidencies
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtaxresidency
        description: Upvest Create a tax residency
        call: investment-tax-residencies.createtaxresidency
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-tax-residencies-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Tax Residencies. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: upvest-list-tax-residencies
      description: Upvest List tax residencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-tax-residencies.listtaxresidencies
      outputParameters:
      - type: object
        mapping: $.
    - name: upvest-create-tax-residency
      description: Upvest Create a tax residency
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: investment-tax-residencies.createtaxresidency
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
