naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Reports
  description: 'Upvest Investment API — Reports. 1 operations. Lead operation: Upvest List reports. Self-contained Naftiko
    capability covering one Upvest business surface.'
  tags:
  - Upvest
  - Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-reports
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Reports business capability. Self-contained, no shared references.
    resources:
    - name: reports
      path: /reports
      operations:
      - name: listreports
        method: GET
        description: Upvest List reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-reports-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Reports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/reports
      name: reports
      description: REST surface for reports.
      operations:
      - method: GET
        name: listreports
        description: Upvest List reports
        call: investment-reports.listreports
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-reports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Reports. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: upvest-list-reports
      description: Upvest List reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-reports.listreports
      outputParameters:
      - type: object
        mapping: $.
