naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Authentication
  description: 'Upvest Investment API — Authentication. 1 operations. Lead operation: Upvest Create an access token. Self-contained
    Naftiko capability covering one Upvest business surface.'
  tags:
  - Upvest
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-authentication
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: auth-token
      path: /auth/token
      operations:
      - name: createaccesstoken
        method: POST
        description: Upvest Create an access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-authentication-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/auth/token
      name: auth-token
      description: REST surface for auth-token.
      operations:
      - method: POST
        name: createaccesstoken
        description: Upvest Create an access token
        call: investment-authentication.createaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: upvest-create-access-token
      description: Upvest Create an access token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: investment-authentication.createaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
