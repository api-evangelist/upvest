    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: Upvest List users
        call: investment-users.listusers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Upvest Create a user
        call: investment-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{user-id}
      name: users-user-id
      description: REST surface for users-user_id.
      operations:
      - method: GET
        name: retrieveuser
        description: Upvest Retrieve a user
        call: investment-users.retrieveuser
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateuser
