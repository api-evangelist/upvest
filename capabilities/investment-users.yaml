    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: upvest-list-users
      description: Upvest List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
