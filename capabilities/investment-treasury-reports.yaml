naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Treasury Reports
  description: 'Upvest Investment API — Treasury Reports. 1 operations. Lead operation: Upvest List treasury reports. Self-contained
    Naftiko capability covering one Upvest business surface.'
  tags:
  - Upvest
  - Treasury Reports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-treasury-reports
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Treasury Reports business capability. Self-contained, no shared references.
    resources:
    - name: treasury_reports
      path: /treasury_reports
      operations:
      - name: listtreasuryreports
        method: GET
        description: Upvest List treasury reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-treasury-reports-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Treasury Reports. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/treasury-reports
      name: treasury-reports
      description: REST surface for treasury_reports.
      operations:
      - method: GET
        name: listtreasuryreports
        description: Upvest List treasury reports
        call: investment-treasury-reports.listtreasuryreports
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-treasury-reports-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Treasury Reports. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: upvest-list-treasury-reports
      description: Upvest List treasury reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-treasury-reports.listtreasuryreports
      outputParameters:
      - type: object
        mapping: $.
