naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Direct Debits
  description: 'Upvest Investment API — Direct Debits. 2 operations. Lead operation: Upvest Create a direct debit. Self-contained
    Naftiko capability covering one Upvest business surface.'
  tags:
  - Upvest
  - Direct Debits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-direct-debits
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Direct Debits business capability. Self-contained, no shared references.
    resources:
    - name: direct_debits
      path: /direct_debits
      operations:
      - name: createdirectdebit
        method: POST
        description: Upvest Create a direct debit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listdirectdebits
        method: GET
        description: Upvest List direct debits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-direct-debits-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Direct Debits. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/direct-debits
      name: direct-debits
      description: REST surface for direct_debits.
      operations:
      - method: POST
        name: createdirectdebit
        description: Upvest Create a direct debit
        call: investment-direct-debits.createdirectdebit
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listdirectdebits
        description: Upvest List direct debits
        call: investment-direct-debits.listdirectdebits
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-direct-debits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Direct Debits. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: upvest-create-direct-debit
      description: Upvest Create a direct debit
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: investment-direct-debits.createdirectdebit
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: upvest-list-direct-debits
      description: Upvest List direct debits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-direct-debits.listdirectdebits
      outputParameters:
      - type: object
        mapping: $.
