      name: accounts
      description: REST surface for accounts.
      operations:
      - method: GET
        name: listaccounts
        description: Upvest List accounts
        call: investment-accounts.listaccounts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createaccount
        description: Upvest Create an account
        call: investment-accounts.createaccount
