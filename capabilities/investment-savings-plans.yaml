      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-savings-plans.retrievesavingsplan
      outputParameters:
      - type: object
        mapping: $.
    - name: upvest-update-savings-plan
      description: Upvest Update a savings plan
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: investment-savings-plans.updatesavingsplan
      with:
