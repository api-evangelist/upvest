naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Orders
  description: 'Upvest Investment API — Orders. 3 operations. Lead operation: Upvest List orders. Self-contained Naftiko capability
    covering one Upvest business surface.'
  tags:
  - Upvest
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-orders
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: Upvest List orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account_id
          in: query
          type: string
          description: Filter orders by account identifier.
        - name: status
          in: query
          type: string
          description: Filter orders by status.
      - name: createorder
        method: POST
        description: Upvest Place an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orders-order_id
      path: /orders/{order_id}
      operations:
      - name: retrieveorder
        method: GET
        description: Upvest Retrieve an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-orders-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: GET
        name: listorders
        description: Upvest List orders
        call: investment-orders.listorders
        with:
          account_id: rest.account_id
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createorder
        description: Upvest Place an order
        call: investment-orders.createorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{order-id}
      name: orders-order-id
      description: REST surface for orders-order_id.
      operations:
      - method: GET
        name: retrieveorder
        description: Upvest Retrieve an order
        call: investment-orders.retrieveorder
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Orders. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: upvest-list-orders
      description: Upvest List orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-orders.listorders
      with:
        account_id: tools.account_id
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: upvest-place-order
      description: Upvest Place an order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: investment-orders.createorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: upvest-retrieve-order
      description: Upvest Retrieve an order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-orders.retrieveorder
      outputParameters:
      - type: object
        mapping: $.
