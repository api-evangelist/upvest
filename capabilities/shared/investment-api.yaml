naftiko: "1.0.0-alpha1"

info:
  label: "Upvest Investment API"
  description: "Full-service investment infrastructure API covering users, accounts, orders, portfolios, savings plans, payments, instruments, tax compliance, webhooks, and reporting."
  tags:
    - Upvest
    - Investments
    - Banking Infrastructure
    - Fintech
    - Securities
    - Trading
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UPVEST_CLIENT_ID: UPVEST_CLIENT_ID
      UPVEST_CLIENT_SECRET: UPVEST_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: upvest-investment
      baseUri: https://api.upvest.co
      description: "Upvest Investment API for building embedded investment experiences."
      authentication:
        type: bearer
        token: "{{UPVEST_ACCESS_TOKEN}}"
      resources:
        - name: authentication
          path: /auth/token
          description: "OAuth 2.0 token management"
          operations:
            - name: create-access-token
              method: POST
              description: "Obtain an OAuth 2.0 access token using client credentials"
              inputParameters:
                - name: grant_type
                  in: body
                  type: string
                  required: true
                  description: "Must be client_credentials"
                - name: client_id
                  in: body
                  type: string
                  required: true
                  description: "Client identifier"
                - name: client_secret
                  in: body
                  type: string
                  required: true
                  description: "Client secret"
                - name: scope
                  in: body
                  type: string
                  required: true
                  description: "Space-separated scopes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /users
          description: "End user management"
          operations:
            - name: list-users
              method: GET
              description: "Retrieve a paginated list of all onboarded users"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Onboard a new user to the investment platform"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  first_name: "{{tools.first_name}}"
                  last_name: "{{tools.last_name}}"
                  email: "{{tools.email}}"
                  date_of_birth: "{{tools.date_of_birth}}"
                  nationality: "{{tools.nationality}}"
            - name: retrieve-user
              method: GET
              description: "Retrieve details for a specific user"
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
                  description: "User UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user
              method: PATCH
              description: "Update profile information for an existing user"
              inputParameters:
                - name: user_id
                  in: path
                  type: string
                  required: true
                  description: "User UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: accounts
          path: /accounts
          description: "Investment account management"
          operations:
            - name: list-accounts
              method: GET
              description: "Retrieve all investment accounts"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: POST
              description: "Create a new investment account"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  user_id: "{{tools.user_id}}"
                  account_group_id: "{{tools.account_group_id}}"
            - name: retrieve-account
              method: GET
              description: "Retrieve a specific investment account"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: close-account
              method: DELETE
              description: "Close an investment account"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: instruments
          path: /instruments
          description: "Financial instruments and price data"
          operations:
            - name: list-instruments
              method: GET
              description: "List available financial instruments"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: retrieve-instrument
              method: GET
              description: "Retrieve a specific instrument"
              inputParameters:
                - name: instrument_id
                  in: path
                  type: string
                  required: true
                  description: "Instrument UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-instrument-prices
              method: GET
              description: "Retrieve real-time and historical price data"
              inputParameters:
                - name: instrument_id
                  in: path
                  type: string
                  required: true
                  description: "Instrument UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: orders
          path: /orders
          description: "Order placement and management"
          operations:
            - name: list-orders
              method: GET
              description: "List all orders"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: place-order
              method: POST
              description: "Place a new buy or sell order"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  account_id: "{{tools.account_id}}"
                  instrument_id: "{{tools.instrument_id}}"
                  side: "{{tools.side}}"
                  amount: "{{tools.amount}}"
            - name: retrieve-order
              method: GET
              description: "Retrieve a specific order"
              inputParameters:
                - name: order_id
                  in: path
                  type: string
                  required: true
                  description: "Order UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-order
              method: DELETE
              description: "Cancel a pending order"
              inputParameters:
                - name: order_id
                  in: path
                  type: string
                  required: true
                  description: "Order UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: portfolios
          path: /portfolios
          description: "Portfolio management"
          operations:
            - name: list-portfolios
              method: GET
              description: "List all portfolios"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-portfolio
              method: POST
              description: "Create a new portfolio"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  account_id: "{{tools.account_id}}"
            - name: retrieve-portfolio
              method: GET
              description: "Retrieve a specific portfolio"
              inputParameters:
                - name: portfolio_id
                  in: path
                  type: string
                  required: true
                  description: "Portfolio UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: savings-plans
          path: /savings_plans
          description: "Automated savings plan management"
          operations:
            - name: list-savings-plans
              method: GET
              description: "List all savings plans"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-savings-plan
              method: POST
              description: "Create a new savings plan"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  account_id: "{{tools.account_id}}"
                  amount: "{{tools.amount}}"
                  frequency: "{{tools.frequency}}"
            - name: update-savings-plan
              method: PATCH
              description: "Update a savings plan"
              inputParameters:
                - name: savings_plan_id
                  in: path
                  type: string
                  required: true
                  description: "Savings plan UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-savings-plan
              method: DELETE
              description: "Delete a savings plan"
              inputParameters:
                - name: savings_plan_id
                  in: path
                  type: string
                  required: true
                  description: "Savings plan UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payments
          path: /payments
          description: "Payment operations including top-ups, withdrawals, and direct debits"
          operations:
            - name: create-direct-debit
              method: POST
              description: "Create a direct debit payment"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  account_id: "{{tools.account_id}}"
                  amount: "{{tools.amount}}"
            - name: list-direct-debits
              method: GET
              description: "List direct debit operations"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-withdrawal
              method: POST
              description: "Process a cash withdrawal"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  account_id: "{{tools.account_id}}"
                  amount: "{{tools.amount}}"
            - name: list-withdrawals
              method: GET
              description: "List withdrawal operations"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: positions
          path: /positions
          description: "Account position and valuation data"
          operations:
            - name: list-positions
              method: GET
              description: "List current holdings for an account"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-valuations
              method: GET
              description: "List account valuations"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-returns
              method: GET
              description: "List investment returns for an account"
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: "Account UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: webhooks
          path: /webhooks
          description: "Webhook subscription management"
          operations:
            - name: list-webhook-subscriptions
              method: GET
              description: "List all webhook subscriptions"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-webhook-subscription
              method: POST
              description: "Register a new webhook endpoint"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  url: "{{tools.url}}"
                  events: "{{tools.events}}"
            - name: retrieve-webhook-subscription
              method: GET
              description: "Retrieve a specific webhook subscription"
              inputParameters:
                - name: webhook_id
                  in: path
                  type: string
                  required: true
                  description: "Webhook UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-webhook-subscription
              method: DELETE
              description: "Delete a webhook subscription"
              inputParameters:
                - name: webhook_id
                  in: path
                  type: string
                  required: true
                  description: "Webhook UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reports
          path: /reports
          description: "Reporting and transaction data"
          operations:
            - name: list-reports
              method: GET
              description: "List user-facing investment reports"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-transactions
              method: GET
              description: "List transaction history"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-fees
              method: GET
              description: "List fee charges on accounts"
              inputParameters:
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: upvest-investment-rest
      resources:
        - path: /v1/auth/token
          name: auth-token
          operations:
            - method: POST
              name: create-access-token
              description: "Create access token"
              call: "upvest-investment.create-access-token"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          operations:
            - method: GET
              name: list-users
              description: "List users"
              call: "upvest-investment.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              description: "Create user"
              call: "upvest-investment.create-user"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{user_id}
          name: user
          operations:
            - method: GET
              name: retrieve-user
              description: "Retrieve user"
              call: "upvest-investment.retrieve-user"
              with:
                user_id: "rest.user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts
          name: accounts
          operations:
            - method: GET
              name: list-accounts
              description: "List accounts"
              call: "upvest-investment.list-accounts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-account
              description: "Create account"
              call: "upvest-investment.create-account"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/orders
          name: orders
          operations:
            - method: GET
              name: list-orders
              description: "List orders"
              call: "upvest-investment.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: place-order
              description: "Place order"
              call: "upvest-investment.place-order"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: upvest-investment-mcp
      transport: http
      tools:
        - name: list-users
          description: "List all onboarded users"
          hints:
            readOnly: true
          call: "upvest-investment.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: "Onboard a new user"
          hints:
            readOnly: false
          call: "upvest-investment.create-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-accounts
          description: "List investment accounts"
          hints:
            readOnly: true
          call: "upvest-investment.list-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-orders
          description: "List orders"
          hints:
            readOnly: true
          call: "upvest-investment.list-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: place-order
          description: "Place a buy or sell order"
          hints:
            readOnly: false
          call: "upvest-investment.place-order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-portfolios
          description: "List portfolios"
          hints:
            readOnly: true
          call: "upvest-investment.list-portfolios"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-savings-plans
          description: "List savings plans"
          hints:
            readOnly: true
          call: "upvest-investment.list-savings-plans"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-instruments
          description: "List available financial instruments"
          hints:
            readOnly: true
          call: "upvest-investment.list-instruments"
          outputParameters:
            - type: object
              mapping: "$."
