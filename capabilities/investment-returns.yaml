naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Returns
  description: 'Upvest Investment API — Returns. 1 operations. Lead operation: Upvest List account returns. Self-contained
    Naftiko capability covering one Upvest business surface.'
  tags:
  - Upvest
  - Returns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-returns
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Returns business capability. Self-contained, no shared references.
    resources:
    - name: accounts-account_id-returns
      path: /accounts/{account_id}/returns
      operations:
      - name: listaccountreturns
        method: GET
        description: Upvest List account returns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-returns-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Returns. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/accounts/{account-id}/returns
      name: accounts-account-id-returns
      description: REST surface for accounts-account_id-returns.
      operations:
      - method: GET
        name: listaccountreturns
        description: Upvest List account returns
        call: investment-returns.listaccountreturns
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-returns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Returns. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: upvest-list-account-returns
      description: Upvest List account returns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: investment-returns.listaccountreturns
      outputParameters:
      - type: object
        mapping: $.
