naftiko: 1.0.0-alpha2
info:
  label: Upvest Investment API — Portfolio Orders
  description: 'Upvest Investment API — Portfolio Orders. 1 operations. Lead operation: Upvest Place a portfolio order. Self-contained
    Naftiko capability covering one Upvest business surface.'
  tags:
  - Upvest
  - Portfolio Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPVEST_API_KEY: UPVEST_API_KEY
capability:
  consumes:
  - type: http
    namespace: investment-portfolio-orders
    baseUri: https://api.upvest.co
    description: Upvest Investment API — Portfolio Orders business capability. Self-contained, no shared references.
    resources:
    - name: portfolios-portfolio_id-orders
      path: /portfolios/{portfolio_id}/orders
      operations:
      - name: createportfolioorder
        method: POST
        description: Upvest Place a portfolio order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.UPVEST_API_KEY}}'
  exposes:
  - type: rest
    namespace: investment-portfolio-orders-rest
    port: 8080
    description: REST adapter for Upvest Investment API — Portfolio Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/portfolios/{portfolio-id}/orders
      name: portfolios-portfolio-id-orders
      description: REST surface for portfolios-portfolio_id-orders.
      operations:
      - method: POST
        name: createportfolioorder
        description: Upvest Place a portfolio order
        call: investment-portfolio-orders.createportfolioorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: investment-portfolio-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upvest Investment API — Portfolio Orders. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: upvest-place-portfolio-order
      description: Upvest Place a portfolio order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: investment-portfolio-orders.createportfolioorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
