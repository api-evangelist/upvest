        completed_at:
          type: string
          format: date-time
          description: >-
            When the check was completed.
          example: '2025-03-15T14:30:00Z'
    TaxResidency:
      type: object
      description: >-
        A tax residency record for a user.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        country:
          type: string
          description: >-
            The country of tax residency as an ISO 3166-1 alpha-2 code.
          pattern: '^[A-Z]{2}$'
