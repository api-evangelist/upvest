      properties:
        type:
          type: string
          description: >-
            The type of external identifier.
          example: standard
        value:
          type: string
          description: >-
            The identifier value.
          example: example-value
    UserIdentifierUpdate:
      type: object
      description: >-
        Request body for updating a user identifier.
      properties:
        value:
          type: string
          description: >-
            The updated identifier value.
          example: example-value
    UserCheck:
      type: object
