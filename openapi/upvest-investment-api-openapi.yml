components:
  securitySchemes:
    oauth2ClientCredentials:
      type: oauth2
      description: >-
        OAuth 2.0 client credentials flow. Obtain an access token by
        providing your client ID and client secret.
      flows:
        clientCredentials:
          tokenUrl: /auth/token
          scopes:
            users:read: Read user data
            users:admin: Onboard and manage users
            accounts:read: Read account data
            accounts:admin: Create and manage accounts
            orders:read: Read order data
            orders:admin: Place and manage orders
            instruments:read: Read instrument data
            portfolios:read: Read portfolio data
            portfolios:admin: Create and manage portfolios
            positions:read: Read position data
            payments:read: Read payment data
            payments:admin: Manage payments and direct debits
            reports:read: Read reports
            webhooks:read: Read webhook subscriptions
            webhooks:admin: Manage webhook subscriptions
            transactions:read: Read transaction data
            fees:read: Read fee data
            fees:admin: Configure fees
  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      description: >-
        The unique identifier of the user.
      schema:
        type: string
        format: uuid
    AccountId:
      name: account_id
      in: path
      required: true
      description: >-
        The unique identifier of the account.
      schema:
        type: string
        format: uuid
    InstrumentId:
      name: instrument_id
      in: path
      required: true
      description: >-
        The unique identifier of the instrument.
      schema:
        type: string
        format: uuid
    OrderId:
      name: order_id
      in: path
      required: true
      description: >-
        The unique identifier of the order.
      schema:
        type: string
        format: uuid
    PortfolioId:
      name: portfolio_id
      in: path
      required: true
      description: >-
        The unique identifier of the portfolio.
      schema:
        type: string
        format: uuid
    SavingsPlanId:
      name: savings_plan_id
      in: path
      required: true
      description: >-
        The unique identifier of the savings plan.
      schema:
        type: string
        format: uuid
    PositionId:
      name: position_id
      in: path
      required: true
      description: >-
        The unique identifier of the position.
      schema:
        type: string
        format: uuid
    WebhookId:
      name: webhook_id
      in: path
      required: true
      description: >-
        The unique identifier of the webhook subscription.
      schema:
        type: string
        format: uuid
    MandateId:
      name: mandate_id
      in: path
      required: true
      description: >-
        The unique identifier of the mandate.
      schema:
        type: string
        format: uuid
    FileId:
      name: file_id
      in: path
      required: true
      description: >-
        The unique identifier of the file.
      schema:
        type: string
        format: uuid
    IdentifierId:
      name: identifier_id
      in: path
      required: true
      description: >-
        The unique identifier of the user identifier.
      schema:
        type: string
        format: uuid
    Offset:
      name: offset
      in: query
      description: >-
        The number of items to skip for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      description: >-
        The maximum number of items to return per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    AccessToken:
      type: object
      description: >-
        An OAuth 2.0 access token for authenticating API requests.
      properties:
        access_token:
          type: string
          description: >-
            The opaque access token string.
          example: eyJhbGciOiJSUzI1NiJ9.example
        token_type:
          type: string
          enum:
          - bearer
          description: >-
            The type of token issued.
          example: bearer
        expires_in:
          type: integer
          description: >-
            The lifetime of the access token in seconds.
          example: 3600
        scope:
          type: string
          description: >-
            The scopes granted to the access token.
          example: users:read accounts:read
    User:
      type: object
      description: >-
        An end user on the investment platform.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the user.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        first_name:
          type: string
          description: >-
            The user's first name.
          example: Example Name
        last_name:
          type: string
          description: >-
            The user's last name.
          example: Example Name
        email:
          type: string
          format: email
          description: >-
            The user's email address.
          example: user@example.com
        date_of_birth:
          type: string
          format: date
          description: >-
            The user's date of birth.
          example: '2025-03-15'
        nationality:
          type: string
          description: >-
            The user's nationality as an ISO 3166-1 alpha-2 country code.
          pattern: '^[A-Z]{2}$'
          example: DE
        address:
          $ref: '#/components/schemas/Address'
        status:
          type: string
          enum:
          - PENDING
          - ACTIVE
          - BLOCKED
          - CLOSED
          description: >-
            The current status of the user.
          example: PENDING
        created_at:
          type: string
          format: date-time
          description: >-
            The date and time when the user was created.
          example: '2025-03-15T14:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: >-
            The date and time when the user was last updated.
          example: '2025-03-15T14:30:00Z'
    UserCreate:
      type: object
      description: >-
        Request body for creating a new user.
      required:
      - first_name
      - last_name
      - email
      - date_of_birth
      - nationality
      - address
      properties:
        first_name:
          type: string
          description: >-
            The user's first name.
          example: Example Name
        last_name:
          type: string
          description: >-
            The user's last name.
          example: Example Name
        email:
          type: string
          format: email
          description: >-
            The user's email address.
          example: user@example.com
        date_of_birth:
          type: string
          format: date
          description: >-
            The user's date of birth.
          example: '2025-03-15'
        nationality:
          type: string
          description: >-
            The user's nationality as an ISO 3166-1 alpha-2 country code.
          pattern: '^[A-Z]{2}$'
          example: DE
        address:
          $ref: '#/components/schemas/Address'
    UserUpdate:
      type: object
      description: >-
        Request body for updating user information.
      properties:
        first_name:
          type: string
          description: >-
            The user's first name.
          example: Example Name
        last_name:
          type: string
          description: >-
            The user's last name.
          example: Example Name
        email:
          type: string
          format: email
          description: >-
            The user's email address.
          example: user@example.com
        address:
          $ref: '#/components/schemas/Address'
    Address:
      type: object
      description: >-
        A postal address.
      required:
      - street
      - city
      - postal_code
      - country
      properties:
        street:
          type: string
          description: >-
            The street name and number.
          example: Example Street 1
        additional_line:
          type: string
          description: >-
            Additional address line.
          example: example-value
        city:
          type: string
          description: >-
            The city name.
          example: Berlin
        postal_code:
          type: string
          description: >-
            The postal or ZIP code.
          example: '10115'
        state:
          type: string
          description: >-
            The state or province.
          example: BE
        country:
          type: string
          description: >-
            The country as an ISO 3166-1 alpha-2 code.
          pattern: '^[A-Z]{2}$'
          example: DE
    UserIdentifier:
      type: object
      description: >-
        An external identifier associated with a user.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier.
