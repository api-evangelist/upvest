      operationId: retrieveWebhookSubscription
      summary: Upvest Retrieve a webhook subscription
      description: >-
        Retrieve details for a specific webhook subscription.
      tags:
        - Webhook Subscriptions
      parameters:
        - $ref: '#/components/parameters/WebhookId'
      responses:
        '200':
          description: Webhook subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Webhook subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateWebhookSubscription
      summary: Upvest Update a webhook subscription
      description: >-
        Update the configuration of an existing webhook subscription.
      tags:
        - Webhook Subscriptions
      parameters:
        - $ref: '#/components/parameters/WebhookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSubscriptionUpdate'
      responses:
        '200':
          description: Webhook subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteWebhookSubscription
      summary: Upvest Delete a webhook subscription
      description: >-
        Remove a webhook subscription. Events will no longer be delivered to
        this endpoint.
      tags:
        - Webhook Subscriptions
      parameters:
        - $ref: '#/components/parameters/WebhookId'
      responses:
        '204':
          description: Webhook subscription deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Webhook subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    oauth2ClientCredentials:
      type: oauth2
      description: >-
        OAuth 2.0 client credentials flow. Obtain an access token by
        providing your client ID and client secret.
      flows:
        clientCredentials:
          tokenUrl: /auth/token
          scopes:
            users:read: Read user data
            users:admin: Onboard and manage users
            accounts:read: Read account data
            accounts:admin: Create and manage accounts
            orders:read: Read order data
            orders:admin: Place and manage orders
            instruments:read: Read instrument data
            portfolios:read: Read portfolio data
            portfolios:admin: Create and manage portfolios
            positions:read: Read position data
            payments:read: Read payment data
            payments:admin: Manage payments and direct debits
            reports:read: Read reports
            webhooks:read: Read webhook subscriptions
            webhooks:admin: Manage webhook subscriptions
            transactions:read: Read transaction data
            fees:read: Read fee data
            fees:admin: Configure fees
  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      description: >-
        The unique identifier of the user.
      schema:
        type: string
        format: uuid
    AccountId:
      name: account_id
      in: path
      required: true
      description: >-
        The unique identifier of the account.
      schema:
        type: string
        format: uuid
    InstrumentId:
      name: instrument_id
      in: path
      required: true
      description: >-
        The unique identifier of the instrument.
      schema:
        type: string
        format: uuid
    OrderId:
      name: order_id
      in: path
      required: true
      description: >-
        The unique identifier of the order.
      schema:
        type: string
        format: uuid
    PortfolioId:
      name: portfolio_id
      in: path
      required: true
      description: >-
        The unique identifier of the portfolio.
      schema:
        type: string
        format: uuid
    SavingsPlanId:
      name: savings_plan_id
      in: path
      required: true
      description: >-
        The unique identifier of the savings plan.
      schema:
        type: string
        format: uuid
    PositionId:
      name: position_id
      in: path
      required: true
      description: >-
        The unique identifier of the position.
      schema:
        type: string
        format: uuid
    WebhookId:
      name: webhook_id
      in: path
      required: true
      description: >-
        The unique identifier of the webhook subscription.
      schema:
        type: string
        format: uuid
    MandateId:
      name: mandate_id
      in: path
      required: true
      description: >-
        The unique identifier of the mandate.
      schema:
        type: string
        format: uuid
    FileId:
      name: file_id
      in: path
      required: true
      description: >-
        The unique identifier of the file.
      schema:
        type: string
        format: uuid
    IdentifierId:
      name: identifier_id
      in: path
      required: true
      description: >-
        The unique identifier of the user identifier.
      schema:
        type: string
        format: uuid
    Offset:
      name: offset
      in: query
      description: >-
        The number of items to skip for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      description: >-
        The maximum number of items to return per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    AccessToken:
      type: object
      description: >-
        An OAuth 2.0 access token for authenticating API requests.
      properties:
        access_token:
          type: string
          description: >-
            The opaque access token string.
        token_type:
          type: string
          enum:
            - bearer
          description: >-
            The type of token issued.
        expires_in:
          type: integer
          description: >-
            The lifetime of the access token in seconds.
        scope:
          type: string
          description: >-
            The scopes granted to the access token.
    User:
      type: object
      description: >-
        An end user on the investment platform.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the user.
        first_name:
          type: string
          description: >-
            The user's first name.
        last_name:
          type: string
          description: >-
            The user's last name.
        email:
          type: string
          format: email
          description: >-
            The user's email address.
        date_of_birth:
          type: string
          format: date
          description: >-
            The user's date of birth.
        nationality:
          type: string
          description: >-
            The user's nationality as an ISO 3166-1 alpha-2 country code.
          pattern: '^[A-Z]{2}$'
        address:
          $ref: '#/components/schemas/Address'
        status:
          type: string
          enum:
            - PENDING
            - ACTIVE
            - BLOCKED
            - CLOSED
          description: >-
            The current status of the user.
        created_at:
          type: string
          format: date-time
          description: >-
            The date and time when the user was created.
        updated_at:
          type: string
          format: date-time
          description: >-
            The date and time when the user was last updated.
    UserCreate:
      type: object
      description: >-
        Request body for creating a new user.
      required:
        - first_name
        - last_name
        - email
        - date_of_birth
        - nationality
        - address
      properties:
        first_name:
          type: string
          description: >-
            The user's first name.
        last_name:
          type: string
          description: >-
            The user's last name.
        email:
          type: string
          format: email
          description: >-
            The user's email address.
        date_of_birth:
          type: string
          format: date
          description: >-
            The user's date of birth.
        nationality:
          type: string
          description: >-
            The user's nationality as an ISO 3166-1 alpha-2 country code.
          pattern: '^[A-Z]{2}$'
        address:
          $ref: '#/components/schemas/Address'
    UserUpdate:
      type: object
      description: >-
        Request body for updating user information.
      properties:
        first_name:
          type: string
          description: >-
            The user's first name.
        last_name:
          type: string
          description: >-
            The user's last name.
        email:
          type: string
          format: email
          description: >-
            The user's email address.
        address:
          $ref: '#/components/schemas/Address'
    Address:
      type: object
      description: >-
        A postal address.
      required:
        - street
        - city
        - postal_code
        - country
      properties:
        street:
          type: string
          description: >-
            The street name and number.
        additional_line:
          type: string
          description: >-
            Additional address line.
        city:
          type: string
          description: >-
            The city name.
        postal_code:
          type: string
          description: >-
            The postal or ZIP code.
        state:
          type: string
          description: >-
            The state or province.
        country:
          type: string
          description: >-
            The country as an ISO 3166-1 alpha-2 code.
          pattern: '^[A-Z]{2}$'
    UserIdentifier:
      type: object
      description: >-
        An external identifier associated with a user.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier.
        type:
          type: string
          description: >-
            The type of external identifier.
        value:
          type: string
          description: >-
            The identifier value.
        created_at:
          type: string
          format: date-time
          description: >-
            When the identifier was created.
    UserIdentifierCreate:
      type: object
      description: >-
        Request body for creating a user identifier.
      required:
        - type
        - value
      properties:
        type:
          type: string
          description: >-
            The type of external identifier.
        value:
          type: string
          description: >-
            The identifier value.
    UserIdentifierUpdate:
      type: object
      description: >-
        Request body for updating a user identifier.
      properties:
        value:
          type: string
          description: >-
            The updated identifier value.
    UserCheck:
      type: object
      description: >-
        A compliance or verification check on a user.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the check.
        type:
          type: string
          description: >-
            The type of check performed.
        status:
          type: string
          enum:
            - PENDING
            - PASSED
            - FAILED
          description: >-
            The current status of the check.
        created_at:
          type: string
          format: date-time
          description: >-
            When the check was created.
        completed_at:
          type: string
          format: date-time
          description: >-
            When the check was completed.
    TaxResidency:
      type: object
      description: >-
        A tax residency record for a user.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier.
        country:
          type: string
          description: >-
            The country of tax residency as an ISO 3166-1 alpha-2 code.
          pattern: '^[A-Z]{2}$'
        tax_identification_number:
          type: string
          description: >-
            The tax identification number in the given country.
        created_at:
          type: string
          format: date-time
          description: >-
            When the record was created.
    TaxResidencyCreate:
      type: object
      description: >-
        Request body for creating a tax residency record.
      required:
        - country
      properties:
        country:
          type: string
          description: >-
            The country of tax residency as an ISO 3166-1 alpha-2 code.
          pattern: '^[A-Z]{2}$'
        tax_identification_number:
          type: string
          description: >-
            The tax identification number in the given country.
    Account:
      type: object
      description: >-
        An investment account that holds positions and tracks balances.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the account.
        user_id:
          type: string
          format: uuid
          description: >-
            The user who owns this account.
        account_group_id:
          type: string
          format: uuid
          description: >-
            The account group this account belongs to.
        type:
          type: string
          description: >-
            The type of investment account.
        status:
          type: string
          enum:
            - PENDING
            - OPEN
            - CLOSING
            - CLOSED
          description: >-
            The current status of the account.
        created_at:
          type: string
          format: date-time
          description: >-
            When the account was created.
        updated_at:
          type: string
          format: date-time
          description: >-
            When the account was last updated.
    AccountCreate:
      type: object
      description: >-
        Request body for creating an investment account.
      required:
        - user_id
        - account_group_id
      properties:
        user_id:
          type: string
          format: uuid
          description: >-
            The user to create the account for.
        account_group_id:
          type: string
          format: uuid
          description: >-
            The account group to assign the account to.
        type:
          type: string
          description: >-
            The type of investment account.
    AccountUpdate:
      type: object
      description: >-
        Request body for updating an investment account.
      properties:
        type:
          type: string
          description: >-
            The type of investment account.
    Instrument:
      type: object
      description: >-
        A tradeable financial instrument such as a stock, ETF, or bond.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the instrument.
        isin:
          type: string
          description: >-
            The International Securities Identification Number.
          pattern: '^[A-Z]{2}[A-Z0-9]{9}[0-9]$'
        wkn:
          type: string
          description: >-
            The Wertpapierkennnummer (German securities ID).
        name:
          type: string
          description: >-
            The name of the instrument.
        type:
          type: string
          enum:
            - EQUITY
            - ETF
            - BOND
            - FUND
          description: >-
            The instrument type.
        currency:
          type: string
          description: >-
            The trading currency as an ISO 4217 code.
          pattern: '^[A-Z]{3}$'
        exchanges:
          type: array
          items:
            $ref: '#/components/schemas/Exchange'
          description: >-
            Exchanges where the instrument is traded.
        tradeable:
          type: boolean
          description: >-
            Whether the instrument is currently tradeable.
        fractional_trading_enabled:
          type: boolean
          description: >-
            Whether fractional shares are supported for this instrument.
    Exchange:
      type: object
      description: >-
        A securities exchange where instruments are traded.
      properties:
        id:
          type: string
          description: >-
            The exchange identifier.
        name:
          type: string
          description: >-
            The exchange name.
        mic:
          type: string
          description: >-
            The Market Identifier Code (ISO 10383).
    InstrumentPrice:
      type: object
      description: >-
        Price data for an instrument on a specific exchange.
      properties:
        instrument_id:
          type: string
          format: uuid
          description: >-
            The instrument identifier.
        exchange_id:
          type: string
          description: >-
            The exchange identifier.
        price:
          type: string
          description: >-
            The current price as a decimal string.
        currency:
          type: string
          description: >-
            The price currency as an ISO 4217 code.
          pattern: '^[A-Z]{3}$'
        timestamp:
          type: string
          format: date-time
          description: >-
            When this price was recorded.
    Order:
      type: object
      description: >-
        A buy or sell order for a financial instrument.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the order.
        account_id:
          type: string
          format: uuid
          description: >-
            The account the order belongs to.
        user_id:
          type: string
          format: uuid
          description: >-
            The user who placed the order.
        instrument_id:
          type: string
          format: uuid
          description: >-
            The instrument being traded.
        side:
          type: string
          enum:
            - BUY
            - SELL
          description: >-
            Whether this is a buy or sell order.
        type:
          type: string
          enum:
            - MARKET
            - LIMIT
            - STOP
          description: >-
            The order type.
        status:
          type: string
          enum:
            - NEW
            - PROCESSING
            - FILLED
            - CANCELLED
            - REJECTED
          description: >-
            The current status of the order.
        quantity:
          type: string
          description: >-
            The quantity of shares to trade as a decimal string.
        cash_amount:
          type: string
          description: >-
            The cash amount to invest as a decimal string.
        limit_price:
          type: string
          description: >-
            The limit price for limit orders as a decimal string.
        stop_price:
          type: string
          description: >-
            The stop price for stop orders as a decimal string.
        currency:
          type: string
          description: >-
            The order currency as an ISO 4217 code.
          pattern: '^[A-Z]{3}$'
        created_at:
          type: string
          format: date-time
          description: >-
            When the order was placed.
        updated_at:
          type: string
          format: date-time
          description: >-
            When the order was last updated.
    OrderCreate:
      type: object
      description: >-
        Request body for placing an order.
      required:
        - account_id
        - instrument_id
        - side
        - type
      properties:
        account_id:
          type: string
          format: uuid
          description: >-
            The account to place the order for.
        instrument_id:
          type: string
          format: uuid
          description: >-
            The instrument to trade.
        side:
          type: string
          enum:
            - BUY
            - SELL
          description: >-
            Whether to buy or sell.
        type:
          type: string
          enum:
            - MARKET
            - LIMIT
            - STOP
          description: >-
            The order type.
        quantity:
          type: string
          description: >-
            The quantity of shares to trade as a decimal string.
        cash_amount:
          type: string
          description: >-
            The cash amount to invest as a decimal string.
        limit_price:
          type: string
          description: >-
