        tax_identification_number:
          type: string
          description: >-
            The tax identification number in the given country.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        created_at:
          type: string
          format: date-time
          description: >-
            When the record was created.
          example: '2025-03-15T14:30:00Z'
    TaxResidencyCreate:
      type: object
      description: >-
        Request body for creating a tax residency record.
      required:
      - country
      properties:
        country:
          type: string
          description: >-
            The country of tax residency as an ISO 3166-1 alpha-2 code.
          pattern: '^[A-Z]{2}$'
          example: DE
        tax_identification_number:
          type: string
          description: >-
            The tax identification number in the given country.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    Account:
      type: object
      description: >-
        An investment account that holds positions and tracks balances.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the account.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        user_id:
          type: string
          format: uuid
          description: >-
            The user who owns this account.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        account_group_id:
          type: string
          format: uuid
          description: >-
            The account group this account belongs to.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type:
          type: string
          description: >-
            The type of investment account.
          example: standard
        status:
          type: string
          enum:
          - PENDING
          - OPEN
          - CLOSING
          - CLOSED
          description: >-
            The current status of the account.
          example: PENDING
        created_at:
          type: string
          format: date-time
          description: >-
            When the account was created.
          example: '2025-03-15T14:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: >-
            When the account was last updated.
          example: '2025-03-15T14:30:00Z'
    AccountCreate:
      type: object
      description: >-
        Request body for creating an investment account.
      required:
      - user_id
      - account_group_id
      properties:
        user_id:
          type: string
          format: uuid
          description: >-
            The user to create the account for.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        account_group_id:
          type: string
          format: uuid
          description: >-
            The account group to assign the account to.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        type:
          type: string
          description: >-
            The type of investment account.
          example: standard
    AccountUpdate:
      type: object
      description: >-
        Request body for updating an investment account.
      properties:
        type:
          type: string
          description: >-
            The type of investment account.
          example: standard
    Instrument:
      type: object
      description: >-
        A tradeable financial instrument such as a stock, ETF, or bond.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the instrument.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        isin:
          type: string
          description: >-
            The International Securities Identification Number.
          pattern: '^[A-Z]{2}[A-Z0-9]{9}[0-9]$'
          example: DE0005140008
        wkn:
          type: string
          description: >-
            The Wertpapierkennnummer (German securities ID).
          example: example-value
        name:
          type: string
          description: >-
            The name of the instrument.
          example: Example Name
        type:
          type: string
          enum:
          - EQUITY
          - ETF
          - BOND
          - FUND
          description: >-
            The instrument type.
          example: EQUITY
        currency:
          type: string
          description: >-
            The trading currency as an ISO 4217 code.
          pattern: '^[A-Z]{3}$'
          example: EUR
        exchanges:
          type: array
          items:
            $ref: '#/components/schemas/Exchange'
          description: >-
            Exchanges where the instrument is traded.
          example:
          - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            name: Example Name
            mic: example-value
        tradeable:
          type: boolean
          description: >-
            Whether the instrument is currently tradeable.
          example: true
        fractional_trading_enabled:
          type: boolean
          description: >-
            Whether fractional shares are supported for this instrument.
          example: true
    Exchange:
      type: object
      description: >-
        A securities exchange where instruments are traded.
      properties:
        id:
          type: string
          description: >-
            The exchange identifier.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          description: >-
            The exchange name.
          example: Example Name
        mic:
          type: string
          description: >-
            The Market Identifier Code (ISO 10383).
          example: example-value
    InstrumentPrice:
      type: object
      description: >-
        Price data for an instrument on a specific exchange.
      properties:
        instrument_id:
          type: string
          format: uuid
          description: >-
            The instrument identifier.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        exchange_id:
          type: string
          description: >-
            The exchange identifier.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        price:
          type: string
          description: >-
            The current price as a decimal string.
          example: example-value
        currency:
          type: string
          description: >-
            The price currency as an ISO 4217 code.
          pattern: '^[A-Z]{3}$'
          example: EUR
        timestamp:
          type: string
          format: date-time
          description: >-
            When this price was recorded.
          example: '2025-03-15T14:30:00Z'
    Order:
      type: object
      description: >-
        A buy or sell order for a financial instrument.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The unique identifier of the order.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        account_id:
          type: string
          format: uuid
          description: >-
            The account the order belongs to.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        user_id:
          type: string
          format: uuid
          description: >-
            The user who placed the order.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        instrument_id:
          type: string
          format: uuid
          description: >-
            The instrument being traded.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        side:
          type: string
          enum:
          - BUY
          - SELL
          description: >-
            Whether this is a buy or sell order.
          example: BUY
        type:
          type: string
          enum:
          - MARKET
          - LIMIT
          - STOP
          description: >-
            The order type.
          example: MARKET
        status:
          type: string
          enum:
          - NEW
          - PROCESSING
          - FILLED
          - CANCELLED
          - REJECTED
          description: >-
            The current status of the order.
          example: NEW
        quantity:
          type: string
          description: >-
            The quantity of shares to trade as a decimal string.
          example: example-value
        cash_amount:
          type: string
          description: >-
            The cash amount to invest as a decimal string.
          example: example-value
        limit_price:
          type: string
          description: >-
            The limit price for limit orders as a decimal string.
          example: example-value
        stop_price:
          type: string
          description: >-
            The stop price for stop orders as a decimal string.
          example: example-value
        currency:
          type: string
          description: >-
            The order currency as an ISO 4217 code.
          pattern: '^[A-Z]{3}$'
          example: EUR
        created_at:
          type: string
          format: date-time
          description: >-
            When the order was placed.
          example: '2025-03-15T14:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: >-
            When the order was last updated.
          example: '2025-03-15T14:30:00Z'
    OrderCreate:
      type: object
