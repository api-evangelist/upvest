        type:
          type: string
          description: >-
            The type of external identifier.
          example: standard
        value:
          type: string
          description: >-
            The identifier value.
          example: example-value
        created_at:
          type: string
          format: date-time
          description: >-
            When the identifier was created.
          example: '2025-03-15T14:30:00Z'
    UserIdentifierCreate:
      type: object
      description: >-
        Request body for creating a user identifier.
      required:
