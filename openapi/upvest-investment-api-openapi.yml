          description: >-
            The account to place the order for.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        instrument_id:
          type: string
          format: uuid
          description: >-
            The instrument to trade.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        side:
          type: string
          enum:
          - BUY
          - SELL
          description: >-
            Whether to buy or sell.
          example: BUY
        type:
          type: string
          enum:
          - MARKET
          - LIMIT
          - STOP
          description: >-
            The order type.
          example: MARKET
        quantity:
          type: string
          description: >-
            The quantity of shares to trade as a decimal string.
          example: example-value
        cash_amount:
          type: string
          description: >-
            The cash amount to invest as a decimal string.
          example: example-value
        limit_price:
          type: string
          description: >-
            The limit price for limit orders as a decimal string.
          example: example-value
        stop_price:
          type: string
          description: >-
            The stop price for stop orders as a decimal string.
          example: example-value
        currency:
          type: string
          description: >-
            The order currency as an ISO 4217 code.
          pattern: '^[A-Z]{3}$'
          example: EUR
    OrderCancellation:
      type: object
      description: >-
        A cancellation request for an order.
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The cancellation identifier.
